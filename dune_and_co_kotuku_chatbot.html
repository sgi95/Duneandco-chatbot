<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dune and Co. — Kō Customer Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f4f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
    #chat-wrap { display: flex; flex-direction: column; height: 620px; width: 100%; max-width: 540px; border: 1px solid #ddd; border-radius: 16px; overflow: hidden; background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
    #chat-header { background: #1a1a14; padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
    .hdr-av { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .hdr-brand { font-size: 11px; color: #8a9e6e; letter-spacing: 0.06em; text-transform: uppercase; }
    .hdr-name { font-size: 15px; font-weight: 500; color: #e8e0c8; }
    .hdr-status { font-size: 12px; color: rgba(255,255,255,0.45); display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    .hdr-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #7dff95; display: inline-block; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: #f5f4f0; }
    .msg { display: flex; gap: 8px; align-items: flex-end; max-width: 85%; }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.6; color: #1a1a14; }
    .msg.bot .bubble { background: #fff; border: 1px solid #e0dfd8; border-bottom-left-radius: 4px; }
    .msg.user .bubble { background: #2a3320; color: #d4e8a8; border-bottom-right-radius: 4px; }
    .bot-av { width: 28px; height: 28px; border-radius: 50%; background: #1a1a14; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: #888; animation: bounce 1.2s infinite ease-in-out; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    #quick-chips { display: flex; flex-wrap: wrap; gap: 7px; padding: 10px 14px 6px; background: #fff; border-top: 1px solid #e0dfd8; }
    .chip { font-size: 12px; padding: 5px 11px; border-radius: 50px; border: 1px solid #ccc; background: #f5f4f0; color: #555; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .chip:hover { background: #2a3320; color: #d4e8a8; border-color: #3d5028; }
    #input-row { display: flex; gap: 8px; padding: 10px 14px 14px; background: #fff; align-items: flex-end; }
    #user-input { flex: 1; resize: none; border: 1px solid #ccc; border-radius: 20px; padding: 9px 14px; font-size: 14px; font-family: inherit; background: #f5f4f0; color: #1a1a14; line-height: 1.4; max-height: 100px; outline: none; }
    #user-input:focus { border-color: #5a7a30; }
    #send-btn { width: 38px; height: 38px; border-radius: 50%; background: #2a3320; border: none; color: #d4e8a8; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; transition: opacity 0.15s; }
    #send-btn:hover { opacity: 0.8; }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  </style>
</head>
<body>

<div id="chat-wrap">
  <div id="chat-header">
    <div class="hdr-av">🪶</div>
    <div>
      <div class="hdr-brand">Dune and Co.</div>
      <div class="hdr-name">Kō — Customer Support</div>
      <div class="hdr-status">Online now</div>
    </div>
  </div>

  <div id="messages">
    <div class="msg bot">
      <div class="bot-av">🪶</div>
      <div class="bubble">Kia ora — welcome to Dune and Co. I'm Kō, your support assistant for the Kōtuku Bar. I can help with ingredients, nutrition, purchasing, allergens, and our company values. How can I help you today?</div>
    </div>
  </div>

  <div id="quick-chips">
    <button class="chip" onclick="sendChip(this)">What's in the Kōtuku Bar?</button>
    <button class="chip" onclick="sendChip(this)">How much protein?</button>
    <button class="chip" onclick="sendChip(this)">Is it vegan?</button>
    <button class="chip" onclick="sendChip(this)">Where can I buy it?</button>
    <button class="chip" onclick="sendChip(this)">Does it contain nuts?</button>
    <button class="chip" onclick="sendChip(this)">Why is it called Kōtuku?</button>
    <button class="chip" onclick="sendChip(this)">How much does it cost?</button>
    <button class="chip" onclick="sendChip(this)">Tell me about the packaging</button>
  </div>

  <div id="input-row">
    <textarea id="user-input" rows="1" placeholder="Ask about the Kōtuku Bar..."></textarea>
    <button id="send-btn" onclick="handleSend()" aria-label="Send">&#9658;</button>
  </div>
</div>

<script>
const KB = [
  {
    keys: ['ingredient','what','inside','made of','contain','layer','composition','make up'],
    response: `The Kōtuku Bar is made up of three distinct layers, each with fewer than 10 clean ingredients in total:<br><br><strong>Layer 1 — Toasted oat base:</strong> Oats blended with plant protein, pressed into a bar mould<br><strong>Layer 2 — Pistachio tahini centre:</strong> Pistachio and tahini blended together and applied over the base<br><strong>Layer 3 — Dark chocolate protein shell:</strong> The bar is enrobed in a dark chocolate coating and set to cool<br><br>All ingredients are whole food and clean-label — no artificial colours or preservatives.`
  },
  {
    keys: ['protein','how much protein','20g','gram'],
    response: `Each Kōtuku Bar contains <strong>20 grams of plant-based protein</strong> — delivered entirely from plant sources, with no dairy or whey involved. It is one of the highest plant-protein breakfast bars available in New Zealand at its price point.`
  },
  {
    keys: ['vegan','plant','dairy free','dairy-free','animal','whey'],
    response: `Yes — the Kōtuku Bar is <strong>100% plant-based and fully vegan</strong>. It contains no dairy, no whey, and no animal products of any kind. All 20 grams of protein come from plant sources.`
  },
  {
    keys: ['nut','allerg','pistachio','peanut','tree nut'],
    response: `The Kōtuku Bar <strong>does contain nuts</strong> — pistachio is one of the core ingredients in the centre layer. The bar is also manufactured in a facility that handles peanuts and tree nuts. It is <strong>not suitable for people with nut allergies</strong>. If you have a severe allergy, please contact us directly before purchasing.`
  },
  {
    keys: ['gluten','oat','coeliac','celiac'],
    response: `The Kōtuku Bar contains <strong>oats</strong>, which means it may not be suitable for people with coeliac disease or a gluten intolerance. We recommend checking the ingredient label on the packaging or contacting us directly if you have a specific dietary requirement.`
  },
  {
    keys: ['price','cost','how much','$','nzd','cheap','afford'],
    response: `The Kōtuku Bar is priced at <strong>$3.99 NZD per bar</strong>. We designed this price point specifically to make a premium, high-protein breakfast bar accessible to students and young New Zealanders — without compromising on ingredient quality.`
  },
  {
    keys: ['buy','purchase','where','stock','store','campus','retailer','shop','available','find'],
    response: `The Kōtuku Bar is available through the following channels:<br><br><strong>Online:</strong> Via the Dune and Co. website with nationwide delivery across New Zealand<br><strong>Campus stores:</strong> Selected university campus retailers<br><strong>Health food stores:</strong> Selected health and specialty food stores nationwide<br><br>For the most current stockist list, please visit the Dune and Co. website.`
  },
  {
    keys: ['packag','compostable','waste','sustainable','environment','plastic','wrap','zero'],
    response: `The Kōtuku Bar uses <strong>fully compostable packaging</strong> — zero-waste is a non-negotiable commitment for Dune and Co. Every bar is individually wrapped in a compostable material that is more environmentally responsible than conventional plastic. Each wrapper also displays the batch code, expiry date, and full ingredient list.`
  },
  {
    keys: ['kotuku','kōtuku','name','why called','bird','heron','white','maori','māori','rare'],
    response: `The kōtuku is <strong>New Zealand's white heron</strong> — one of the rarest native birds in the country. In Māori tradition, seeing a kōtuku was considered a once-in-a-lifetime moment, a symbol of rarity and exceptional quality.<br><br>Dune and Co. chose the name to honour New Zealand's natural heritage and to reflect what the bar represents: something rare, premium, and distinctly Kiwi.`
  },
  {
    keys: ['dubai','chocolate','trend','pistachio','tahini','inspiration','inspired'],
    response: `The Kōtuku Bar is <strong>New Zealand's first Dubai chocolate protein bar</strong>. It was inspired by the global Dubai chocolate trend — the viral pistachio-tahini-chocolate combination — and reimagined as a plant-powered, high-protein breakfast bar made right here in New Zealand.<br><br>The tagline says it best: <em>NZ Crafted. Plant Powered. Dubai Inspired.</em>`
  },
  {
    keys: ['made','manufactur','where made','christchurch','prosoma','mpi','factory','facility','nz','new zealand'],
    response: `The Kōtuku Bar is <strong>manufactured in Christchurch, New Zealand</strong> by Prosoma Ltd — an MPI (Ministry for Primary Industries) approved and audited food safety facility located in Belfast, Christchurch.<br><br>Every production batch undergoes a physical quality control inspection and a nutritional lab test verifying the 20g protein content before any bar is packaged.`
  },
  {
    keys: ['value','mission','brand','company','about','who','dune','ethos','belief','stand for'],
    response: `Dune and Co. is built on five core values:<br><br><strong>NZ Crafted</strong> — designed, formulated, and manufactured entirely in New Zealand<br><strong>Plant Powered</strong> — 100% plant-based, always<br><strong>Dubai Inspired</strong> — a global trend made locally and authentically<br><strong>Zero Waste</strong> — compostable packaging is non-negotiable<br><strong>Accessible Premium</strong> — premium quality at a price students can actually afford`
  },
  {
    keys: ['taste','flavour','flavor','what does it taste','delicious','yum','nice'],
    response: `The Kōtuku Bar has three distinct flavour layers: a <strong>nutty, wholesome oat base</strong>, a <strong>creamy pistachio tahini centre</strong>, and a <strong>rich dark chocolate shell</strong>. The combination is inspired by the Dubai chocolate flavour profile — indulgent and satisfying, while remaining a clean, high-protein breakfast option.`
  },
  {
    keys: ['shelf','expir','last','stor','keep','long'],
    response: `The Kōtuku Bar's expiry date is printed on each bar's compostable packaging along with the batch code. For best results, store the bar in a cool, dry place away from direct sunlight. Please refer to the packaging for the specific best-before date on your bar.`
  },
  {
    keys: ['return','refund','wrong','damage','broken','complaint','issue','problem'],
    response: `If you have received a damaged, incorrect, or unsatisfactory product, please contact the Dune and Co. team directly via the website as soon as possible. We are committed to making things right and will work with you to resolve any issue promptly.`
  },
  {
    keys: ['delivery','ship','shipping','how long','arrive','dispatch','postage'],
    response: `Dune and Co. ships nationwide across New Zealand. For current delivery timeframes, pricing, and options, please visit the Dune and Co. website — delivery details are updated there regularly.`
  },
  {
    keys: ['wholesale','bulk','order','retailer','partner','stock us','range'],
    response: `For wholesale, bulk ordering, or retail partnership enquiries, please reach out to the Dune and Co. team directly via the website. We would be happy to discuss ranging the Kōtuku Bar in your store.`
  },
  {
    keys: ['hi','hello','hey','kia ora','good morning','morning','hiya'],
    response: `Kia ora — great to hear from you! I'm Kō, Dune and Co.'s support assistant. Feel free to ask me anything about the Kōtuku Bar — ingredients, nutrition, where to buy, or our company values. What can I help you with?`
  },
  {
    keys: ['thank','thanks','cheers','awesome','great','helpful','appreciate'],
    response: `You're very welcome — it's our pleasure to help. If you have any other questions about the Kōtuku Bar or Dune and Co., don't hesitate to ask. Enjoy the bar!`
  }
];

const FALLBACK = `That's a great question — I want to make sure you get the most accurate answer. For anything I haven't covered, please visit the <strong>Dune and Co. website</strong> or reach out to our team directly. In the meantime, feel free to ask me about ingredients, nutrition, allergens, pricing, where to buy, or our brand values.`;

function getResponse(input) {
  const q = input.toLowerCase();
  let bestMatch = null;
  let bestScore = 0;
  for (const entry of KB) {
    let score = 0;
    for (const kw of entry.keys) {
      if (q.includes(kw)) score++;
    }
    if (score > bestScore) {
      bestScore = score;
      bestMatch = entry;
    }
  }
  return bestScore > 0 ? bestMatch.response : FALLBACK;
}

const msgsEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
let busy = false;

function scrollBot() { msgsEl.scrollTop = msgsEl.scrollHeight; }

function addMsg(role, html) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  if (role === 'bot') {
    const av = document.createElement('div');
    av.className = 'bot-av';
    av.textContent = '🪶';
    wrap.appendChild(av);
  }
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = html;
  wrap.appendChild(b);
  msgsEl.appendChild(wrap);
  scrollBot();
}

function showTyping() {
  const w = document.createElement('div');
  w.className = 'msg bot';
  w.id = 'typ';
  const av = document.createElement('div');
  av.className = 'bot-av';
  av.textContent = '🪶';
  w.appendChild(av);
  const b = document.createElement('div');
  b.className = 'bubble typing';
  b.innerHTML = '<span></span><span></span><span></span>';
  w.appendChild(b);
  msgsEl.appendChild(w);
  scrollBot();
}

function removeTyping() {
  const el = document.getElementById('typ');
  if (el) el.remove();
}

function sendMessage(text) {
  if (!text.trim() || busy) return;
  busy = true;
  sendBtn.disabled = true;
  addMsg('user', text.replace(/</g, '&lt;'));
  showTyping();
  const reply = getResponse(text);
  setTimeout(() => {
    removeTyping();
    addMsg('bot', reply);
    busy = false;
    sendBtn.disabled = false;
  }, 700 + Math.random() * 400);
}

function handleSend() {
  const t = inputEl.value.trim();
  if (!t) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendMessage(t);
}

function sendChip(btn) { sendMessage(btn.textContent); }

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});
</script>

</body>
</html>
